<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"></head>
<body style="margin:0;padding:0;background:#ffffff;font-family:Arial,Helvetica,sans-serif">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#ffffff">
  <!-- 顶部色条 -->
  <tr><td style="background:#2c3e50;height:4px;font-size:0;line-height:0">&nbsp;</td></tr>
  <!-- 正文：全宽流式，随窗口铺开（AWS 内部通知风格） -->
  <tr><td style="padding:24px 40px;font-size:14px;color:#333;line-height:1.6;font-family:Arial,Helvetica,sans-serif">{{minutes_body}}</td></tr>
  <!-- 页脚分割线 -->
  <tr><td style="padding:0 40px"><table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"><tr><td style="border-top:1px solid #eee;font-size:0;line-height:0">&nbsp;</td></tr></table></td></tr>
  <!-- 页脚 -->
  <tr><td style="padding:16px 40px;font-size:12px;color:#999;text-align:center;font-family:Arial,Helvetica,sans-serif">{{footer}}</td></tr>
</table>
</body></html>
