<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"></head>
<body style="margin:0;padding:0;background:#f4f4f4;font-family:Arial,Helvetica,sans-serif">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f4f4f4">
<tr><td align="center" style="padding:20px 0">
  <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="background:#ffffff">
    <!-- 顶部色条 -->
    <tr><td style="background:#2c3e50;height:4px;font-size:0;line-height:0">&nbsp;</td></tr>
    <!-- 标题区 -->
    <tr><td style="padding:24px 32px 8px;font-size:20px;color:#1a1a1a;font-weight:bold;font-family:Arial,Helvetica,sans-serif">{{meeting_title}}</td></tr>
    <!-- 元信息 -->
    <tr><td style="padding:4px 32px 16px;font-size:13px;color:#666;font-family:Arial,Helvetica,sans-serif">{{meeting_date}}</td></tr>
    <!-- 分割线 -->
    <tr><td style="padding:0 32px"><table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"><tr><td style="border-top:1px solid #eee;font-size:0;line-height:0">&nbsp;</td></tr></table></td></tr>
    <!-- 正文 -->
    <tr><td style="padding:20px 32px;font-size:14px;color:#333;line-height:1.6;font-family:Arial,Helvetica,sans-serif">{{minutes_body}}</td></tr>
    <!-- 页脚分割线 -->
    <tr><td style="padding:0 32px"><table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"><tr><td style="border-top:1px solid #eee;font-size:0;line-height:0">&nbsp;</td></tr></table></td></tr>
    <!-- 页脚 -->
    <tr><td style="padding:16px 32px;font-size:12px;color:#999;text-align:center;font-family:Arial,Helvetica,sans-serif">{{footer}}</td></tr>
  </table>
</td></tr></table>
</body></html>
