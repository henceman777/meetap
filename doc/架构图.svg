<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" style="background: white;">
  <!-- 标题 -->
  <text x="450" y="35" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">会议录制工具 - 系统架构</text>

  <!-- 会议App区域 -->
  <rect x="30" y="60" width="840" height="90" rx="12" fill="#f0f4ff" stroke="#b0c4de" stroke-width="1.5"/>
  <text x="50" y="82" font-family="sans-serif" font-size="11" fill="#666">会议应用层</text>

  <rect x="60" y="92" width="120" height="44" rx="8" fill="#4a7cf7" stroke="none"/>
  <text x="120" y="119" font-family="sans-serif" font-size="14" text-anchor="middle" fill="white">Zoom</text>

  <rect x="210" y="92" width="120" height="44" rx="8" fill="#5b5fc7" stroke="none"/>
  <text x="270" y="119" font-family="sans-serif" font-size="14" text-anchor="middle" fill="white">Teams</text>

  <rect x="360" y="92" width="120" height="44" rx="8" fill="#3ecf8e" stroke="none"/>
  <text x="420" y="119" font-family="sans-serif" font-size="14" text-anchor="middle" fill="white">飞书</text>

  <rect x="510" y="92" width="140" height="44" rx="8" fill="#e86c5f" stroke="none"/>
  <text x="580" y="119" font-family="sans-serif" font-size="14" text-anchor="middle" fill="white">腾讯会议</text>

  <!-- App设置标注 -->
  <text x="120" y="152" font-family="monospace" font-size="9" text-anchor="middle" fill="#888">Same as System</text>
  <text x="270" y="152" font-family="monospace" font-size="9" text-anchor="middle" fill="#888">BlackHole 2ch</text>
  <text x="420" y="152" font-family="monospace" font-size="9" text-anchor="middle" fill="#888">跟随系统</text>
  <text x="580" y="152" font-family="monospace" font-size="9" text-anchor="middle" fill="#888">BlackHole 2ch</text>

  <!-- 箭头: Apps → BlackHole -->
  <line x1="120" y1="136" x2="120" y2="200" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="136" x2="350" y2="200" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="420" y1="136" x2="400" y2="200" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="136" x2="480" y2="200" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- macOS音频系统 -->
  <rect x="30" y="170" width="840" height="100" rx="12" fill="#fff8f0" stroke="#e0c8a0" stroke-width="1.5"/>
  <text x="50" y="192" font-family="sans-serif" font-size="11" fill="#666">macOS 音频系统</text>

  <rect x="280" y="200" width="280" height="50" rx="10" fill="#ff9f43" stroke="#e08530" stroke-width="2"/>
  <text x="420" y="222" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="white">BlackHole 2ch</text>
  <text x="420" y="240" font-family="monospace" font-size="10" text-anchor="middle" fill="#fff8">48kHz · 2ch · 系统默认输出</text>

  <!-- 分叉箭头 -->
  <line x1="350" y1="250" x2="200" y2="330" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <line x1="490" y1="250" x2="640" y2="330" stroke="#2ecc71" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- 用户进程层 -->
  <rect x="30" y="310" width="840" height="190" rx="12" fill="#f0fff4" stroke="#a0d8b0" stroke-width="1.5"/>
  <text x="50" y="332" font-family="sans-serif" font-size="11" fill="#666">用户进程层</text>

  <!-- ffmpeg -->
  <rect x="80" y="340" width="240" height="70" rx="10" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="200" y="368" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="white">ffmpeg</text>
  <text x="200" y="388" font-family="monospace" font-size="10" text-anchor="middle" fill="#ffd8d8">avfoundation → AAC 128kbps</text>

  <!-- audio-monitor -->
  <rect x="520" y="340" width="280" height="70" rx="10" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="660" y="368" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="white">audio-monitor</text>
  <text x="660" y="388" font-family="monospace" font-size="10" text-anchor="middle" fill="#d8ffd8">AUHAL · 环形缓冲区 · 实时转发</text>

  <!-- audio-monitor 内部 -->
  <rect x="530" y="420" width="80" height="26" rx="4" fill="#1a9e54" stroke="none"/>
  <text x="570" y="437" font-family="monospace" font-size="9" text-anchor="middle" fill="white">输入AU</text>
  <text x="620" y="437" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#666">→</text>
  <rect x="630" y="420" width="60" height="26" rx="4" fill="#888" stroke="none"/>
  <text x="660" y="437" font-family="monospace" font-size="9" text-anchor="middle" fill="white">Buffer</text>
  <text x="700" y="437" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#666">→</text>
  <rect x="710" y="420" width="80" height="26" rx="4" fill="#1a9e54" stroke="none"/>
  <text x="750" y="437" font-family="monospace" font-size="9" text-anchor="middle" fill="white">输出AU</text>

  <!-- meeting-record.sh -->
  <rect x="250" y="450" width="340" height="40" rx="8" fill="#34495e" stroke="#2c3e50" stroke-width="2"/>
  <text x="420" y="475" font-family="monospace" font-size="14" text-anchor="middle" fill="white">meeting-record.sh</text>
  <!-- 虚线连接 -->
  <line x1="320" y1="450" x2="200" y2="410" stroke="#34495e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGray)"/>
  <line x1="520" y1="450" x2="660" y2="410" stroke="#34495e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGray)"/>
  <text x="240" y="440" font-family="sans-serif" font-size="9" fill="#34495e">启动/停止</text>
  <text x="545" y="440" font-family="sans-serif" font-size="9" fill="#34495e">启动/停止</text>

  <!-- 输出层 -->
  <rect x="30" y="520" width="840" height="130" rx="12" fill="#f8f0ff" stroke="#c0a0d8" stroke-width="1.5"/>
  <text x="50" y="542" font-family="sans-serif" font-size="11" fill="#666">输出层</text>

  <!-- 录音文件 -->
  <rect x="80" y="555" width="240" height="70" rx="10" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/>
  <text x="200" y="583" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">~/Record/</text>
  <text x="200" y="605" font-family="monospace" font-size="10" text-anchor="middle" fill="#e8d0f0">meeting_YYYYMMDD_HHMMSS.m4a</text>

  <!-- Speaker -->
  <rect x="520" y="555" width="280" height="70" rx="10" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="660" y="580" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">MacBook Pro Speakers</text>
  <text x="660" y="600" font-family="monospace" font-size="10" text-anchor="middle" fill="#d0e8f8">48kHz · 用户听到声音</text>
  <text x="660" y="616" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#d0e8f8">（或有线耳机）</text>

  <!-- 箭头: ffmpeg → 文件 -->
  <line x1="200" y1="410" x2="200" y2="555" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- 箭头: monitor → Speaker -->
  <line x1="660" y1="446" x2="660" y2="555" stroke="#2ecc71" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- audio-multi-output -->
  <rect x="680" y="162" width="170" height="36" rx="6" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="765" y="184" font-family="monospace" font-size="10" text-anchor="middle" fill="white">audio-multi-output</text>
  <line x1="590" y1="456" x2="765" y2="198" stroke="#95a5a6" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowLight)"/>
  <text x="720" y="210" font-family="sans-serif" font-size="9" fill="#95a5a6">设备查询</text>

  <!-- SwitchAudioSource -->
  <rect x="680" y="122" width="170" height="30" rx="6" fill="#bdc3c7" stroke="#95a5a6" stroke-width="1"/>
  <text x="765" y="141" font-family="monospace" font-size="10" text-anchor="middle" fill="#555">SwitchAudioSource</text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#999"/></marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2ecc71"/></marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#34495e"/></marker>
    <marker id="arrowLight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#95a5a6"/></marker>
  </defs>
</svg>
